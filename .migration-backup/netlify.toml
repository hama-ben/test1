# Netlify deployment configuration — version-controlled build settings.
# Reference: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Build runs from the repo root so pnpm workspace resolution works correctly.
# The publish directory is relative to the repo root.

[build]
  base    = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/talabati run build"
  publish = "artifacts/talabati/dist/public"

# ── Environment variables ───────────────────────────────────────────────────
# Non-secret values only. Secret values (anon key, etc.) must be set in the
# Netlify dashboard → Site → Environment variables — they are injected at
# build time so Vite can bake them in via `define`.
#
# Required variables to add in the Netlify dashboard:
#   VITE_SUPABASE_URL       = https://aeoyteruvcxqimwusrey.supabase.co
#   VITE_SUPABASE_ANON_KEY  = <your Supabase anon key>
#   VITE_API_BASE_URL       = <your Koyeb/Render backend URL>
#                             e.g. https://talabati-xxx.koyeb.app

[build.environment]
  NODE_VERSION = "22"

# ── SPA routing ─────────────────────────────────────────────────────────────
# React Router handles all client-side navigation. Without this rule, a hard
# refresh on any route other than "/" returns a 404 from Netlify's CDN.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Asset caching ────────────────────────────────────────────────────────────
# Vite fingerprints JS/CSS filenames with a content hash, so these files are
# safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
