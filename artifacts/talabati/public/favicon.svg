<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dropStroke" x1="90" y1="15" x2="90" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-30%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background for legibility on light browser tabs -->
  <rect width="180" height="180" rx="36" fill="#0a0e1a"/>

  <!-- Outline-only drop (no fill inside) with glow -->
  <path
    d="M90 20 C90 20 30 80 30 118 C30 152 57 165 90 165 C123 165 150 152 150 118 C150 80 90 20 90 20 Z"
    stroke="url(#dropStroke)"
    stroke-width="7"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Highlight 1 — upper-left, larger -->
  <ellipse cx="66" cy="108" rx="9" ry="22" fill="white" opacity="0.55" transform="rotate(-22 66 108)"/>
  <!-- Highlight 2 — upper-left, smaller accent -->
  <ellipse cx="73" cy="72"  rx="4.5" ry="10" fill="white" opacity="0.32" transform="rotate(-22 73 72)"/>
</svg>
