<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dropGrad" x1="90" y1="12" x2="90" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7ee8fa"/>
      <stop offset="55%"  stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#bae6fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0369a1" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Main water-drop body -->
  <path
    d="M90 12
       C90 12 32 74 32 112
       C32 147 58 168 90 168
       C122 168 148 147 148 112
       C148 74 90 12 90 12 Z"
    fill="url(#dropGrad)"
    filter="url(#dropShadow)"
  />

  <!-- Inner radial glow overlay -->
  <path
    d="M90 12
       C90 12 32 74 32 112
       C32 147 58 168 90 168
       C122 168 148 147 148 112
       C148 74 90 12 90 12 Z"
    fill="url(#glowGrad)"
  />

  <!-- Specular highlight (teardrop-shaped shine, top-left) -->
  <ellipse cx="70" cy="82" rx="10" ry="20"
           fill="white" opacity="0.38"
           transform="rotate(-28 70 82)"/>
  <!-- Tiny secondary highlight -->
  <ellipse cx="79" cy="62" rx="4" ry="7"
           fill="white" opacity="0.22"
           transform="rotate(-28 79 62)"/>
</svg>
